version: "3.9"

networks:
  raft-net:
    driver: bridge

x-replica-base: &replica-base
  build:
    context: ./replica-logic
    dockerfile: Dockerfile
  restart: unless-stopped
  networks:
    - raft-net
  volumes:
    - ./replica-logic:/app
    - /app/node_modules
  healthcheck:
    test: ["CMD-SHELL", "wget -qO- http://localhost:3000/healthz || exit 1"]
    interval: 10s
    timeout:  3s
    retries:  3
    start_period: 15s

services:

  # ── Gateway ────────────────────────────────────────────────────────────────
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: gateway
    restart: unless-stopped
    networks:
      - raft-net
    ports:
      - "4000:4000"
      - "4001:4001"
    volumes:
      # This is the KEY FIX for "Cannot GET /":
      # Mounts your frontend/index.html into the exact path that
      # express.static() in gateway/src/index.js serves from.
      - ./frontend:/app/src/public:ro
    environment:
      GATEWAY_PORT:             "4000"
      INTERNAL_PORT:            "4001"
      REPLICA_URLS: "http://replica1:3000,http://replica2:3000,http://replica3:3000"
      LEADER_PROBE_INTERVAL_MS: "200"
      # RPC_TIMEOUT_MS:           "300"
      RPC_TIMEOUT_MS:           "1000"  # <--- SET THIS TO 1000
      NODE_ENV:                 "development"
    depends_on:
      replica1:
        condition: service_healthy
      replica2:
        condition: service_healthy
      replica3:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4001/healthz || exit 1"]
      interval: 10s
      timeout:  3s
      retries:  3
      start_period: 10s

  # ── Replica 1 ───────────────────────────────────────────────────────────────
  replica1:
    <<: *replica-base
    container_name: replica1
    hostname: replica1
    ports:
      - "3001:3000"
    environment:
      REPLICA_ID:              "replica1"
      PEER_URLS:               "http://replica1:3000,http://replica2:3000,http://replica3:3000"
      GATEWAY_URL:             "http://gateway:4001"
      PERSIST_FILE:            "/tmp/.raft-replica1.json"
      HEARTBEAT_INTERVAL_MS:   "150"
      ELECTION_TIMEOUT_MIN_MS: "500"
      ELECTION_TIMEOUT_MAX_MS: "800"
      RPC_TIMEOUT_MS:          "300"
      PORT:                    "3000"
      NODE_ENV:                "development"

  # ── Replica 2 ───────────────────────────────────────────────────────────────
  replica2:
    <<: *replica-base
    container_name: replica2
    hostname: replica2
    ports:
      - "3002:3000"
    environment:
      REPLICA_ID:              "replica2"
      PEER_URLS:               "http://replica1:3000,http://replica2:3000,http://replica3:3000"
      GATEWAY_URL:             "http://gateway:4001"
      PERSIST_FILE:            "/tmp/.raft-replica2.json"
      HEARTBEAT_INTERVAL_MS:   "150"
      ELECTION_TIMEOUT_MIN_MS: "500"
      ELECTION_TIMEOUT_MAX_MS: "800"
      RPC_TIMEOUT_MS:          "300"
      PORT:                    "3000"
      NODE_ENV:                "development"

  # ── Replica 3 ───────────────────────────────────────────────────────────────
  replica3:
    <<: *replica-base
    container_name: replica3
    hostname: replica3
    ports:
      - "3003:3000"
    environment:
      REPLICA_ID:              "replica3"
      PEER_URLS:               "http://replica1:3000,http://replica2:3000,http://replica3:3000"
      GATEWAY_URL:             "http://gateway:4001"
      PERSIST_FILE:            "/tmp/.raft-replica3.json"
      HEARTBEAT_INTERVAL_MS:   "150"
      ELECTION_TIMEOUT_MIN_MS: "500"
      ELECTION_TIMEOUT_MAX_MS: "800"
      RPC_TIMEOUT_MS:          "300"
      PORT:                    "3000"
      NODE_ENV:                "development"