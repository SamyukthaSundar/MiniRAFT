<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RaftDraw · Distributed Canvas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ════════════════════════════════════════════════════════════════
   RaftDraw — Modern Dark Theme
   ════════════════════════════════════════════════════════════════ */
:root {
  /* Core palette */
  --bg-primary:     #0d1117;
  --bg-secondary:   #161b22;
  --bg-tertiary:    #21262d;
  --bg-elevated:    #30363d;
  
  /* Text */
  --text-primary:   #f0f6fc;
  --text-secondary: #8b949e;
  --text-muted:     #6e7681;
  
  /* Accents */
  --accent-blue:    #58a6ff;
  --accent-green:   #3fb950;
  --accent-yellow:  #d29922;
  --accent-red:     #f85149;
  --accent-purple:  #a371f7;
  
  /* Borders */
  --border-subtle:  rgba(48, 54, 61, 0.6);
  --border-default: #30363d;
  --border-hover:   #8b949e;
  
  /* Status */
  --status-online:  #3fb950;
  --status-busy:    #d29922;
  --status-offline: #f85149;
  
  /* Canvas */
  --canvas-bg:      #ffffff;
  --canvas-dot:     rgba(0, 0, 0, 0.08);
  
  /* Typography */
  --font-sans:      'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  --font-mono:      'JetBrains Mono', 'SF Mono', Monaco, monospace;
  
  /* Layout */
  --sidebar-w:      260px;
  --header-h:       56px;
  --radius-sm:      6px;
  --radius-md:      10px;
  --radius-lg:      14px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: var(--bg-primary);
  color: var(--text-primary);
  font-family: var(--font-sans);
  font-size: 14px;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ── App Layout ───────────────────────────────────────── */
#app {
  display: grid;
  grid-template-columns: var(--sidebar-w) 1fr var(--sidebar-w);
  grid-template-rows: var(--header-h) 1fr;
  height: 100vh;
  gap: 1px;
  background: var(--border-default);
}

/* ════════════════════════════════════════════════════════════════
   HEADER
   ════════════════════════════════════════════════════════════════ */
#topbar {
  grid-column: 1 / -1;
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 0 20px;
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border-default);
  position: relative;
  z-index: 100;
}

.brand {
  display: flex;
  align-items: center;
  gap: 10px;
}

.brand-icon {
  width: 32px;
  height: 32px;
  background: linear-gradient(135deg, var(--accent-blue) 0%, var(--accent-purple) 100%);
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 14px;
  color: white;
}

.brand-text {
  font-weight: 600;
  font-size: 16px;
  color: var(--text-primary);
  letter-spacing: -0.01em;
}

.brand-text span {
  color: var(--text-secondary);
  font-weight: 500;
}

/* Connection status */
#conn-badge {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 12px;
  background: var(--bg-tertiary);
  border-radius: var(--radius-sm);
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text-secondary);
}

#conn-dot {
  width: 8px; 
  height: 8px;
  border-radius: 50%;
  background: var(--status-offline);
  transition: all 0.3s ease;
  flex-shrink: 0;
}

#conn-dot.connected {
  background: var(--status-online);
  box-shadow: 0 0 8px var(--status-online);
}

#conn-dot.connecting {
  background: var(--status-busy);
  animation: pulse 1.2s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(0.9); }
}

/* Leader info */
#leader-badge {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 16px;
  font-family: var(--font-mono);
  font-size: 12px;
}

.leader-item {
  display: flex;
  align-items: center;
  gap: 6px;
  color: var(--text-secondary);
}

.leader-item .value {
  color: var(--accent-blue);
  font-weight: 500;
  padding: 2px 8px;
  background: rgba(88, 166, 255, 0.1);
  border-radius: 4px;
}

/* ════════════════════════════════════════════════════════════════
   LEFT SIDEBAR — Tools
   ════════════════════════════════════════════════════════════════ */
#toolpanel {
  background: var(--bg-secondary);
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 24px;
  overflow-y: auto;
}

.section-title {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-muted);
  margin-bottom: 12px;
}

/* ── Color Palette ── */
#color-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 8px;
}

.swatch {
  aspect-ratio: 1;
  border-radius: var(--radius-sm);
  cursor: pointer;
  border: 2px solid transparent;
  transition: all 0.15s ease;
  position: relative;
}

.swatch:hover {
  transform: scale(1.1);
  border-color: var(--border-hover);
}

.swatch.active {
  border-color: var(--text-primary);
  box-shadow: 0 0 0 2px var(--bg-secondary), 0 0 0 4px var(--text-primary);
}

/* ── Brush Width ── */
#width-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 8px 0;
}

#width-slider {
  flex: 1;
  -webkit-appearance: none;
  appearance: none;
  height: 4px;
  background: var(--bg-elevated);
  border-radius: 2px;
  outline: none;
  cursor: pointer;
}

#width-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: var(--text-primary);
  cursor: pointer;
  transition: transform 0.15s;
}

#width-slider::-webkit-slider-thumb:hover {
  transform: scale(1.2);
}

#width-preview {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: var(--bg-tertiary);
  border: 1px solid var(--border-default);
  display: flex;
  align-items: center;
  justify-content: center;
}

#width-dot {
  border-radius: 50%;
  background: var(--text-primary);
  transition: all 0.15s;
}

#width-val {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text-secondary);
  min-width: 24px;
  text-align: right;
}

/* ── Action Buttons ── */
.tool-btn {
  width: 100%;
  padding: 10px 14px;
  background: var(--bg-tertiary);
  border: 1px solid var(--border-default);
  border-radius: var(--radius-sm);
  color: var(--text-secondary);
  font-family: var(--font-sans);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s ease;
  display: flex;
  align-items: center;
  gap: 8px;
}

.tool-btn:hover {
  background: var(--bg-elevated);
  border-color: var(--border-hover);
  color: var(--text-primary);
}

.tool-btn.danger {
  color: var(--accent-red);
}

.tool-btn.danger:hover {
  background: rgba(248, 81, 73, 0.1);
  border-color: var(--accent-red);
}

/* ── Stats ── */
#client-id-display {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-muted);
  word-break: break-all;
  line-height: 1.6;
  padding: 8px;
  background: var(--bg-primary);
  border-radius: var(--radius-sm);
  border: 1px solid var(--border-default);
}

.stats-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.stat-box {
  padding: 12px;
  background: var(--bg-tertiary);
  border-radius: var(--radius-sm);
  border: 1px solid var(--border-default);
}

.stat-label {
  font-size: 11px;
  color: var(--text-muted);
  margin-bottom: 4px;
}

.stat-value {
  font-family: var(--font-mono);
  font-size: 18px;
  font-weight: 600;
  color: var(--text-primary);
}

/* ════════════════════════════════════════════════════════════════
   CANVAS AREA
   ════════════════════════════════════════════════════════════════ */
#canvas-wrap {
  position: relative;
  overflow: hidden;
  background: var(--canvas-bg);
  background-image: radial-gradient(circle, var(--canvas-dot) 1px, transparent 1px);
  background-size: 20px 20px;
}

#drawing-canvas {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  cursor: crosshair;
  touch-action: none;
  z-index: 2;
}

/* Floating status indicators */
.floating-pill {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  font-family: var(--font-mono);
  font-size: 11px;
  padding: 8px 16px;
  border-radius: 20px;
  pointer-events: none;
  z-index: 10;
  opacity: 0;
  transition: all 0.3s ease;
  display: flex;
  align-items: center;
  gap: 8px;
}

.floating-pill.visible {
  opacity: 1;
}

#stroke-pending {
  bottom: 20px;
  background: var(--bg-secondary);
  color: var(--text-secondary);
  border: 1px solid var(--border-default);
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
}

#stroke-pending::before {
  content: '';
  width: 12px;
  height: 12px;
  border: 2px solid var(--border-default);
  border-top-color: var(--accent-blue);
  border-radius: 50%;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* No leader overlay */
#no-leader-overlay {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  background: rgba(13, 17, 23, 0.85);
  backdrop-filter: blur(8px);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
  z-index: 20;
}

#no-leader-overlay.visible {
  opacity: 1;
  pointer-events: all;
}

.election-icon {
  width: 64px;
  height: 64px;
  border-radius: var(--radius-md);
  background: var(--bg-tertiary);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  animation: pulse-election 1.5s ease-in-out infinite;
}

@keyframes pulse-election {
  0%, 100% { transform: scale(1); opacity: 1; }
  50% { transform: scale(0.95); opacity: 0.7; }
}

.election-title {
  font-size: 18px;
  font-weight: 600;
  color: var(--text-primary);
}

.election-subtitle {
  font-size: 13px;
  color: var(--text-secondary);
}

/* Canvas corner info */
.canvas-info {
  position: absolute;
  bottom: 16px;
  right: 16px;
  display: flex;
  gap: 16px;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-muted);
  z-index: 5;
}

.canvas-info span {
  display: flex;
  align-items: center;
  gap: 6px;
}

.canvas-info .value {
  color: var(--text-secondary);
  font-weight: 500;
}

/* ════════════════════════════════════════════════════════════════
   RIGHT SIDEBAR — Cluster & Events
   ════════════════════════════════════════════════════════════════ */
#raftpanel {
  background: var(--bg-secondary);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── Node List ── */
#node-list {
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.node-card {
  padding: 14px;
  background: var(--bg-tertiary);
  border: 1px solid var(--border-default);
  border-radius: var(--radius-md);
  transition: all 0.2s ease;
  position: relative;
  overflow: hidden;
}

.node-card::before {
  content: '';
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 3px;
  background: var(--text-muted);
  transition: background 0.2s;
}

.node-card.leader::before {
  background: var(--accent-blue);
}

.node-card.candidate::before {
  background: var(--accent-yellow);
}

.node-card.leader {
  border-color: var(--accent-blue);
  background: rgba(88, 166, 255, 0.08);
}

.node-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}

.node-id {
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 500;
  color: var(--text-primary);
}

.node-status {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.03em;
  padding: 3px 10px;
  border-radius: 4px;
  background: var(--bg-elevated);
  color: var(--text-muted);
}

.node-card.leader .node-status {
  background: rgba(88, 166, 255, 0.15);
  color: var(--accent-blue);
}

.node-metrics {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
}

.metric {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.metric-label {
  font-size: 10px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.metric-value {
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--text-secondary);
  font-weight: 500;
}

/* ── Event Log ── */
#event-log-wrap {
  flex: 1;
  border-top: 1px solid var(--border-default);
  display: flex;
  flex-direction: column;
  min-height: 0;
}

#event-log-header {
  padding: 12px 20px;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-muted);
  border-bottom: 1px solid var(--border-default);
  background: var(--bg-secondary);
}

#event-log {
  flex: 1;
  overflow-y: auto;
  padding: 8px 16px;
}

.ev-entry {
  font-family: var(--font-mono);
  font-size: 11px;
  padding: 6px 0;
  border-bottom: 1px solid var(--border-subtle);
  line-height: 1.5;
  animation: slideIn 0.2s ease;
  display: flex;
  gap: 10px;
}

@keyframes slideIn {
  from { opacity: 0; transform: translateX(-8px); }
  to { opacity: 1; transform: translateX(0); }
}

.ev-entry .ev-time {
  color: var(--text-muted);
  flex-shrink: 0;
}

.ev-entry .ev-msg {
  color: var(--text-secondary);
}

.ev-entry.ev-leader .ev-msg { color: var(--accent-blue); }
.ev-entry.ev-commit .ev-msg { color: var(--accent-green); }
.ev-entry.ev-error .ev-msg { color: var(--accent-red); }
.ev-entry.ev-info .ev-msg { color: var(--text-secondary); }

/* ── Scrollbars ── */
::-webkit-scrollbar {
  width: 6px;
  height: 6px;
}

::-webkit-scrollbar-track {
  background: transparent;
}

::-webkit-scrollbar-thumb {
  background: var(--bg-elevated);
  border-radius: 3px;
}

::-webkit-scrollbar-thumb:hover {
  background: var(--border-hover);
}
</style>
</head>
<body>
<div id="app">

  <!-- Header -->
  <header id="topbar">
    <div class="brand">
      <div class="brand-icon">R</div>
      <div class="brand-text">Raft<span>Draw</span></div>
    </div>
    
    <div id="conn-badge">
      <div id="conn-dot" class="connecting"></div>
      <span id="conn-label">connecting...</span>
    </div>
    
    <div id="leader-badge">
      <div class="leader-item">
        Leader <span class="value" id="leader-label">—</span>
      </div>
      <div class="leader-item">
        Term <span class="value" id="term-label">—</span>
      </div>
    </div>
  </header>

  <!-- Left Sidebar — Tools -->
  <aside id="toolpanel">
    <div>
      <div class="section-title">Color</div>
      <div id="color-grid"></div>
    </div>
    
    <div>
      <div class="section-title">Brush Size</div>
      <div id="width-row">
        <div id="width-preview">
          <div id="width-dot" style="width: 8px; height: 8px;"></div>
        </div>
        <input type="range" id="width-slider" min="1" max="32" value="4" />
        <span id="width-val">4</span>
      </div>
    </div>
    
    <div>
      <div class="section-title">Actions</div>
      <button class="tool-btn danger" id="btn-clear">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
        </svg>
        Clear Canvas
      </button>
    </div>
    
    <div style="margin-top: auto;">
      <div class="section-title">Stats</div>
      <div class="stats-grid">
        <div class="stat-box">
          <div class="stat-label">Strokes</div>
          <div class="stat-value" id="sb-strokes">0</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Committed</div>
          <div class="stat-value" id="sb-committed">0</div>
        </div>
      </div>
      <div style="margin-top: 12px;">
        <div class="section-title">Client ID</div>
        <div id="client-id-display">—</div>
      </div>
    </div>
  </aside>

  <!-- Canvas Area -->
  <main id="canvas-wrap">
    <canvas id="drawing-canvas"></canvas>
    
    <div id="stroke-pending" class="floating-pill">Replicating strokes...</div>
    
    <div id="no-leader-overlay">
      <div class="election-icon">⚡</div>
      <div class="election-title">Electing Leader</div>
      <div class="election-subtitle">Drawing paused — resumes in &lt;1s</div>
    </div>
    
    <div class="canvas-info">
      <span>pending <span class="value" id="sb-pending">0</span></span>
      <span>ws <span class="value" id="sb-ws">—</span></span>
    </div>
  </main>

  <!-- Right Sidebar — Cluster -->
  <aside id="raftpanel">
    <div id="node-list"></div>
    <div id="event-log-wrap">
      <div id="event-log-header">Event Log</div>
      <div id="event-log"></div>
    </div>
  </aside>

</div>

<script>
// ═══════════════════════════════════════════════════════════════════
//  RAFT Drawing Board — Frontend Client
//  Contract: SYSTEM_CONTRACT.md §6.1
// ═══════════════════════════════════════════════════════════════════

// ── Config ──────────────────────────────────────────────────────────
const GATEWAY_WS_URL    = `ws://${location.hostname}:4000/ws`;
const RECONNECT_BASE_MS = 1000;
const RECONNECT_MAX_MS  = 8000;

// ── Palette ─────────────────────────────────────────────────────────
const PALETTE = [
  '#f8f8f2','#e2e2e8','#f59e0b','#ef4444','#22c55e',
  '#60a5fa','#e879f9','#fb923c','#facc15','#34d399',
  '#818cf8','#f472b6','#38bdf8','#4ade80','#a78bfa',
  '#fbbf24','#f87171','#6ee7b7','#93c5fd','#c084fc',
];

// ── State ────────────────────────────────────────────────────────────
const clientId      = crypto.randomUUID();
let ws              = null;
let reconnectDelay  = RECONNECT_BASE_MS;
let currentColor    = PALETTE[0];
let currentWidth    = 4;
let isDrawing       = false;
let currentPoints   = [];
let strokeCount     = 0;
let committedCount  = 0;
let pendingStrokes  = new Map();
let seenLogIndices  = new Set();
let currentLeader   = null;
let currentTerm     = null;
let batchInterval   = null; // Added for Stroke Chunking

// Cluster display state
const NODES     = ['replica1', 'replica2', 'replica3'];
const nodeState = Object.fromEntries(
  NODES.map(id => [id, { role: 'unknown', term: 0, commitIndex: -1, logLength: 0 }])
);

// ── Canvas setup ─────────────────────────────────────────────────────
const canvas = document.getElementById('drawing-canvas');
const ctx    = canvas.getContext('2d');
const committed = document.createElement('canvas');
const cctx      = committed.getContext('2d');

function resizeCanvas() {
  const wrap = document.getElementById('canvas-wrap');
  const dpr  = window.devicePixelRatio || 1;
  const w    = wrap.clientWidth;
  const h    = wrap.clientHeight;

  const snap = (committed.width > 0 && committed.height > 0)
    ? cctx.getImageData(0, 0, committed.width, committed.height)
    : null;

  canvas.width    = w * dpr;
  canvas.height   = h * dpr;
  canvas.style.width  = w + 'px';
  canvas.style.height = h + 'px';
  ctx.scale(dpr, dpr);

  committed.width  = canvas.width;
  committed.height = canvas.height;

  if (snap) cctx.putImageData(snap, 0, 0);
  redrawPreview();
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// ── Rendering ────────────────────────────────────────────────────────
function drawOnCtx(context, stroke, alpha = 1.0, isCommittedLayer = false) {
  if (!stroke.points || stroke.points.length < 2) return;

  const wrap = document.getElementById('canvas-wrap');
  const cssWidth = wrap.clientWidth;
  const cssHeight = wrap.clientHeight;

  context.save();
  context.globalAlpha = alpha;
  context.strokeStyle = stroke.color;
  context.lineWidth   = stroke.width;
  context.lineCap     = 'round';
  context.lineJoin    = 'round';

  if (isCommittedLayer) {
    const dpr = window.devicePixelRatio || 1;
    context.scale(dpr, dpr);
  }

  context.beginPath();
  // Multiply the normalized 0.0-1.0 percentages by the actual screen dimensions
  context.moveTo(stroke.points[0].x * cssWidth, stroke.points[0].y * cssHeight);
  for (let i = 1; i < stroke.points.length; i++) {
    context.lineTo(stroke.points[i].x * cssWidth, stroke.points[i].y * cssHeight);
  }
  context.stroke();
  context.restore();
}

function redrawPreview() {
  const dpr = window.devicePixelRatio || 1;
  ctx.clearRect(0, 0, canvas.width / dpr, canvas.height / dpr);
  ctx.drawImage(committed, 0, 0, canvas.width / dpr, canvas.height / dpr);
  if (isDrawing && currentPoints.length >= 2) {
    drawOnCtx(ctx, { color: currentColor, width: currentWidth, points: currentPoints }, 0.8, false);
  }
}

function rebuildFromLog(strokes) {
  cctx.clearRect(0, 0, committed.width, committed.height);
  for (const { stroke } of strokes) drawOnCtx(cctx, stroke, 1.0, true);
  redrawPreview();
}

// ── Pointer events ────────────────────────────────────────────────────
function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  const src  = e.touches ? e.touches[0] : e;
  // Convert coordinate to a normalized percentage (0.0 to 1.0)
  return { 
    x: (src.clientX - rect.left) / rect.width, 
    y: (src.clientY - rect.top) / rect.height 
  };
}

canvas.addEventListener('pointerdown', e => {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  isDrawing     = true;
  currentPoints = [getPos(e)];
  canvas.setPointerCapture(e.pointerId);

  // Throttling: Send stroke chunks every 150ms to simulate live drawing
  batchInterval = setInterval(() => {
    if (isDrawing && currentPoints.length >= 2) finishStroke(true);
  }, 150);

  e.preventDefault();
});

canvas.addEventListener('pointermove', e => {
  if (!isDrawing) return;
  currentPoints.push(getPos(e));
  redrawPreview();
  e.preventDefault();
});

canvas.addEventListener('pointerup', e => {
  if (!isDrawing) return;
  isDrawing = false;
  clearInterval(batchInterval);
  if (currentPoints.length >= 2) finishStroke(false);
  else currentPoints = [];
  e.preventDefault();
});

canvas.addEventListener('pointercancel', () => {
  isDrawing     = false;
  clearInterval(batchInterval);
  currentPoints = [];
});

// ── Stroke submission ─────────────────────────────────────────────────
function finishStroke(isContinuing = false) {
  const stroke = {
    strokeId:  crypto.randomUUID(),
    clientId,
    color:     currentColor,
    width:     currentWidth,
    points:    [...currentPoints],
    timestamp: Date.now(),
  };

  // If continuing, keep the last point so the next chunk connects flawlessly
  if (isContinuing) {
    currentPoints = [currentPoints[currentPoints.length - 1]];
  } else {
    currentPoints = [];
  }
  
  strokeCount++;
  updateStatusBar();

  // Optimistic render — draw immediately on local canvas
  drawOnCtx(cctx, stroke, 1.0, true);
  redrawPreview();

  pendingStrokes.set(stroke.strokeId, stroke);
  updatePendingIndicator();

  wsSend({ event: 'stroke:new', stroke });
}

// ── WebSocket ─────────────────────────────────────────────────────────
function connect() {
  setConnState('connecting');
  ws = new WebSocket(GATEWAY_WS_URL);

  ws.onopen = () => {
    setConnState('connected');
    reconnectDelay = RECONNECT_BASE_MS;
    logEvent('info', 'Connected to gateway');
    document.getElementById('sb-ws').textContent = 'open';
  };

  ws.onmessage = e => {
    let msg;
    try { msg = JSON.parse(e.data); } catch { return; }
    handleMessage(msg);
  };

  ws.onclose = () => {
    setConnState('disconnected');
    document.getElementById('sb-ws').textContent = 'closed';
    logEvent('error', 'Disconnected — reconnecting…');
    setTimeout(connect, reconnectDelay);
    reconnectDelay = Math.min(reconnectDelay * 1.5, RECONNECT_MAX_MS);
  };

  ws.onerror = () => ws.close();
}

function wsSend(payload) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify(payload));
  }
}

// ── Message handlers §6.1 ─────────────────────────────────────────────
function handleMessage(msg) {
  switch (msg.event) {

    case 'canvas:state': {
      const strokes = msg.strokes || [];
      committedCount = strokes.length;
      for (const { logIndex } of strokes) seenLogIndices.add(logIndex);
      rebuildFromLog(strokes);
      updateStatusBar();
      logEvent('info', `Canvas hydrated (${strokes.length} strokes)`);
      break;
    }

    case 'stroke:commit': {
      if (seenLogIndices.has(msg.logIndex)) break;
      seenLogIndices.add(msg.logIndex);
      committedCount++;

      pendingStrokes.delete(msg.stroke.strokeId);
      updatePendingIndicator();

      if (msg.stroke.clientId !== clientId) {
        drawOnCtx(cctx, msg.stroke, 1.0, true);
        redrawPreview();
      }

      updateStatusBar();
      logEvent('commit', `stroke committed (log[${msg.logIndex}])`);
      break;
    }

    case 'system:leader': {
      currentLeader = msg.leaderId;
      currentTerm   = msg.term;
      updateLeaderBadge();
      setNoLeaderOverlay(false);
      logEvent('leader', `Leader → ${msg.leaderId} (term ${msg.term})`);

      for (const id of NODES) {
        nodeState[id].role = (id === msg.leaderId) ? 'leader' : 'follower';
        nodeState[id].term = msg.term;
      }
      renderNodeCards();
      break;
    }

    case 'canvas:clear': {
      cctx.clearRect(0, 0, committed.width, committed.height);
      redrawPreview();
      committedCount = 0;
      strokeCount    = 0;
      seenLogIndices.clear();
      pendingStrokes.clear();
      updatePendingIndicator();
      updateStatusBar();
      logEvent('info', 'Canvas cleared');
      break;
    }

    case 'system:error': {
      if (msg.code === 'NO_LEADER') {
        setNoLeaderOverlay(true);
        pendingStrokes.delete(msg.strokeId);
        updatePendingIndicator();
        logEvent('error', 'NO_LEADER — stroke dropped, retry');
      } else {
        logEvent('error', `Error: ${msg.code} — ${msg.message}`);
      }
      break;
    }
  }
}

// ── UI helpers ────────────────────────────────────────────────────────
function setConnState(s) {
  const dot   = document.getElementById('conn-dot');
  const label = document.getElementById('conn-label');
  dot.className = s;
  label.textContent =
    s === 'connected'    ? 'connected'    :
    s === 'connecting'   ? 'connecting…'  : 'disconnected';
}

function updateLeaderBadge() {
  document.getElementById('leader-label').textContent = currentLeader || '—';
  document.getElementById('term-label').textContent   = currentTerm   != null ? currentTerm : '—';
}

function setNoLeaderOverlay(visible) {
  document.getElementById('no-leader-overlay').classList.toggle('visible', visible);
}

function updatePendingIndicator() {
  const count = pendingStrokes.size;
  const pill = document.getElementById('stroke-pending');
  pill.classList.toggle('visible', count > 0);
  if (count > 0) {
    const text = count === 1 ? 'Replicating 1 stroke...' : `Replicating ${count} strokes...`;
    // Keep the spinner (::before pseudo-element) by setting text as a span
    pill.innerHTML = text;
  }
  document.getElementById('sb-pending').textContent = count;
}

function updateStatusBar() {
  document.getElementById('sb-strokes').textContent   = strokeCount;
  document.getElementById('sb-committed').textContent = committedCount;
}

// ── Event log ─────────────────────────────────────────────────────────
const MAX_LOG = 80;
function logEvent(type, text) {
  const log  = document.getElementById('event-log');
  const time = new Date().toLocaleTimeString('en', { hour12: false });
  const div  = document.createElement('div');
  div.className = `ev-entry ev-${type}`;
  div.innerHTML = `<span class="ev-time">${esc(time)}</span><span class="ev-msg">${esc(text)}</span>`;
  log.prepend(div);
  while (log.children.length > MAX_LOG) log.removeChild(log.lastChild);
}
function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;');
}

// ── Node cards ────────────────────────────────────────────────────────
function renderNodeCards() {
  const list = document.getElementById('node-list');
  list.innerHTML = '';
  for (const id of NODES) {
    const ns   = nodeState[id];
    const card = document.createElement('div');
    const role = ns.role === 'leader' ? 'leader' : ns.role === 'candidate' ? 'candidate' : '';
    const statusIcon = ns.role === 'leader' ? '●' : ns.role === 'candidate' ? '◐' : '○';
    card.className = `node-card ${role}`;
    card.innerHTML = `
      <div class="node-header">
        <span class="node-id">${id}</span>
        <span class="node-status">${statusIcon} ${ns.role}</span>
      </div>
      <div class="node-metrics">
        <div class="metric">
          <span class="metric-label">Term</span>
          <span class="metric-value">${ns.term}</span>
        </div>
        <div class="metric">
          <span class="metric-label">Commit</span>
          <span class="metric-value">${ns.commitIndex}</span>
        </div>
        <div class="metric">
          <span class="metric-label">Log</span>
          <span class="metric-value">${ns.logLength}</span>
        </div>
      </div>`;
    list.appendChild(card);
  }
}

// ── Colour palette ────────────────────────────────────────────────────
const grid = document.getElementById('color-grid');
PALETTE.forEach((c, i) => {
  const sw = document.createElement('div');
  sw.className = 'swatch' + (i === 0 ? ' active' : '');
  sw.style.background = c;
  sw.title = c;
  sw.addEventListener('click', () => {
    document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
    sw.classList.add('active');
    currentColor = c;
    updateWidthPreview();
  });
  grid.appendChild(sw);
});

// ── Width slider ──────────────────────────────────────────────────────
const slider = document.getElementById('width-slider');
const widthDot = document.getElementById('width-dot');

function updateWidthPreview() {
  const size = Math.max(4, Math.min(28, currentWidth));
  widthDot.style.width = size + 'px';
  widthDot.style.height = size + 'px';
  widthDot.style.background = currentColor;
}

slider.addEventListener('input', () => {
  currentWidth = parseInt(slider.value);
  document.getElementById('width-val').textContent = currentWidth;
  updateWidthPreview();
});

// ── Clear button ──────────────────────────────────────────────────────
document.getElementById('btn-clear').addEventListener('click', () => {
  wsSend({ event: 'canvas:clear', clientId });
  logEvent('info', 'Clear canvas requested');
});

// ── Client ID display ─────────────────────────────────────────────────
document.getElementById('client-id-display').textContent = clientId.slice(0, 18) + '…';

// ── Init ──────────────────────────────────────────────────────────────
updateWidthPreview();
renderNodeCards();
connect();
</script>
</body>
</html>
